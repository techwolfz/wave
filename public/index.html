<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Real-Time Device Tracker</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/public/css/style.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="logo">
                <div class="pulse-indicator"></div>
                <h1>GeoTracker</h1>
            </div>
            <div class="status">
                <span id="connection-status" class="badge disconnected">Disconnected</span>
            </div>
        </header>

        <main class="map-container">
            <div id="map"></div>
            
            <div class="overlay-panel">
                <div class="panel-header">
                    <h2>Tracking Info</h2>
                </div>
                <div class="panel-content">
                    <div class="info-row">
                        <span class="label">My Device ID:</span>
                        <span id="device-id" class="value">Generating...</span>
                    </div>
                    <div class="info-row">
                        <span class="label">Latitude:</span>
                        <span id="lat-val" class="value">--</span>
                    </div>
                    <div class="info-row">
                        <span class="label">Longitude:</span>
                        <span id="lng-val" class="value">--</span>
                    </div>
                    <div class="info-row">
                        <span class="label">Accuracy:</span>
                        <span id="acc-val" class="value">--</span>
                    </div>
                </div>
            </div>
            
            <button id="locate-me-btn" class="fab-button" title="Center on my location">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"></path><path d="M2 12h20"></path></svg>
            </button>
        </main>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <!-- Custom JS -->
    <script src="/public/js/app.js"></script>
</body>
</html>
